<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CinamaChat - نوێترین فیلم و زنجیرەکان بە کوردی</title>
    <meta name="description" content="CinamaChat - باشترین پلاتفۆرمی کوردی بۆ بینینی فیلم و زنجیرەکان بە کوالیتی بەرز و دۆبلاژی کوردی." />
    <meta name="keywords" content="فیلم, زنجیرە, دۆبلاژ, کوردی, نێتفلێکس, CinamaChat" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // If this source index is served on the custom domain, render the live app in an iframe
      // so the browser keeps showing www.cinamachat.com.
      (function () {
        var host = window.location.hostname;
        var isLocal = host === 'localhost' || host === '127.0.0.1' || host === '::1';
        var isCinemaDomain = host === 'www.cinamachat.com' || host === 'cinamachat.com';
        if (!isLocal && isCinemaDomain) {
          window.__CINEMACHAT_EMBED_MODE__ = true;
          var root = document.getElementById('root');
          if (root) {
            root.innerHTML = '';
            var iframe = document.createElement('iframe');
            iframe.src = 'https://gen-lang-client-0240212572.web.app' + window.location.pathname + window.location.search + window.location.hash;
            iframe.title = 'CinamaChat';
            iframe.style.width = '100%';
            iframe.style.height = '100vh';
            iframe.style.border = '0';
            iframe.style.display = 'block';
            document.body.style.margin = '0';
            root.appendChild(iframe);
          }
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
